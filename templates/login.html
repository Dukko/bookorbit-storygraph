<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · BookOrbit → StoryGraph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3250;
      --accent: #7c6af7;
      --red: #f87171;
      --text: #e2e8f0;
      --muted: #8892aa;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }
    h1 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
      margin-bottom: 16px;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    .error {
      background: #2e1212;
      border: 1px solid #6b2a2a;
      color: var(--red);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.82rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>BookOrbit → StoryGraph</h1>
  <p class="sub">Sign in to the sync dashboard</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/login">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" autofocus />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" />
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
